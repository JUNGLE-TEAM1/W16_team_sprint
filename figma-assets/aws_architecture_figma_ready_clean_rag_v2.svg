<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6d28d9"/>
    </marker>
    <style>
      text {
        font-family: "Noto Sans CJK KR", "Noto Sans KR", "Apple SD Gothic Neo", "Inter", Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 64px; font-weight: 800; }
      .subtitle { font-size: 18px; font-weight: 500; fill: #6b7280; }
      .section-title { font-size: 23px; font-weight: 800; }
      .box-title { font-size: 20px; font-weight: 800; }
      .box-small { font-size: 15px; font-weight: 700; }
      .caption { font-size: 13px; font-weight: 600; fill: #64748b; }
      .badge-text { font-size: 12px; font-weight: 800; fill: #ffffff; }

      .aws-boundary { fill: #ffffff; stroke: #111827; stroke-width: 2.4; }
      .eks-boundary { fill: #fff7f0; stroke: #f97316; stroke-width: 2.2; }
      .vpc-boundary { fill: #faf7ff; stroke: #7c3aed; stroke-width: 2; }
      .private-zone { fill: #f1fefd; stroke: #5ad8cc; stroke-width: 1.6; }
      .panel { fill: #f5fbff; stroke: #60a5fa; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .panel-green { fill: #ebffee; stroke: #66d575; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .rag-card { fill: #f8f5ff; stroke: #7c3aed; stroke-width: 2.2; }
      .rag-zone { fill: #fbf8ff; stroke: #7c3aed; stroke-width: 1.8; stroke-dasharray: 8 6; }

      .line { fill: none; stroke: #111827; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-dark); }
      .line-soft { fill: none; stroke: #475569; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-dark); }
      .rag-line { fill: none; stroke: #6d28d9; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); }
      .no-arrow { fill: none; stroke: #111827; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#ffffff"/>

  <rect x="26" y="28" width="28" height="88" fill="#e95b12"/>
  <text x="78" y="94" class="title">아키텍처</text>
  <text x="80" y="128" class="subtitle">XFlow + Metadata RAG 정리본</text>

  <g id="external-side">
    <rect x="72" y="170" width="160" height="64" rx="10" fill="#8b5cf6"/>
    <text x="152" y="210" text-anchor="middle" class="box-title" fill="#ffffff">CloudFront</text>

    <rect x="72" y="286" width="160" height="64" rx="10" fill="#8b5cf6"/>
    <text x="152" y="326" text-anchor="middle" class="box-title" fill="#ffffff">Route 53</text>

    <circle cx="152" cy="452" r="30" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <path d="M100 540 C112 492 192 492 204 540" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <text x="152" y="596" text-anchor="middle" class="section-title">User</text>

    <rect x="50" y="680" width="220" height="310" class="panel"/>
    <text x="160" y="720" text-anchor="middle" class="section-title">Sources</text>
    <text x="105" y="765" text-anchor="middle" class="box-small">DB</text>
    <text x="144" y="765" class="box-small">MYSQL</text>
    <text x="105" y="815" text-anchor="middle" class="box-small">DB</text>
    <text x="144" y="815" class="box-small">MongoDB</text>
    <text x="105" y="865" text-anchor="middle" class="box-small">S3</text>
    <text x="144" y="865" class="box-small">S3</text>
    <text x="105" y="915" text-anchor="middle" class="box-small">API</text>
    <text x="144" y="915" class="box-small">API</text>
    <text x="105" y="965" text-anchor="middle" class="box-small">K</text>
    <text x="144" y="965" class="box-small">Kafka</text>
  </g>

  <g id="aws">
    <rect x="340" y="125" width="1500" height="870" class="aws-boundary"/>
    <rect x="358" y="142" width="58" height="30" rx="6" fill="#111827"/>
    <text x="387" y="163" text-anchor="middle" class="badge-text">AWS</text>

    <g id="s3-top">
      <rect x="455" y="165" width="410" height="165" class="card"/>
      <rect x="475" y="185" width="54" height="30" rx="6" fill="#16a34a"/>
      <text x="502" y="206" text-anchor="middle" class="badge-text">S3</text>
      <rect x="510" y="235" width="130" height="56" rx="10" class="card"/>
      <text x="575" y="269" text-anchor="middle" class="box-title">React</text>
      <rect x="675" y="235" width="130" height="56" rx="10" class="card"/>
      <text x="740" y="269" text-anchor="middle" class="box-title">Data Lake</text>
      <text x="660" y="313" text-anchor="middle" class="caption">정적 웹 / 분석 데이터 저장</text>
    </g>

    <g id="aws-services">
      <rect x="1560" y="165" width="170" height="110" class="panel"/>
      <rect x="1592" y="190" width="106" height="42" rx="9" fill="#10b981"/>
      <text x="1645" y="257" text-anchor="middle" class="box-small">Bedrock</text>
      <rect x="1560" y="310" width="170" height="110" class="panel"/>
      <rect x="1592" y="335" width="106" height="42" rx="9" fill="#e91e63"/>
      <text x="1645" y="402" text-anchor="middle" class="box-small">CloudWatch</text>
    </g>

    <g id="eks">
      <rect x="400" y="380" width="1380" height="575" class="eks-boundary"/>
      <rect x="418" y="397" width="58" height="30" rx="6" fill="#f97316"/>
      <text x="447" y="418" text-anchor="middle" class="badge-text">EKS</text>
      <text x="488" y="421" class="section-title" fill="#f97316">EKS Cluster</text>

      <rect x="445" y="440" width="1295" height="480" class="vpc-boundary"/>
      <rect x="465" y="458" width="58" height="30" rx="6" fill="#7c3aed"/>
      <text x="494" y="479" text-anchor="middle" class="badge-text">VPC</text>
      <text x="535" y="482" class="section-title" fill="#7c3aed">VPC</text>

      <rect x="720" y="485" width="970" height="392" class="private-zone"/>
      <rect x="740" y="505" width="60" height="28" rx="6" fill="#22c55e"/>
      <text x="770" y="525" text-anchor="middle" class="badge-text">LOCK</text>
      <text x="815" y="528" class="section-title">Private subnet</text>

      <rect x="485" y="640" width="180" height="205" class="panel-green"/>
      <text x="575" y="676" text-anchor="middle" class="box-title">Ingress</text>
      <text x="575" y="699" text-anchor="middle" class="caption">public edge</text>
      <rect x="525" y="725" width="100" height="48" rx="8" class="card"/>
      <text x="575" y="756" text-anchor="middle" class="box-small">NAT</text>
      <rect x="525" y="790" width="100" height="48" rx="8" class="card"/>
      <text x="575" y="821" text-anchor="middle" class="box-small">ALB</text>

      <rect x="760" y="555" width="175" height="235" class="panel"/>
      <text x="848" y="590" text-anchor="middle" class="box-title">Query</text>
      <rect x="800" y="625" width="95" height="58" rx="8" class="card"/>
      <text x="848" y="661" text-anchor="middle" class="box-title">Trino</text>
      <rect x="800" y="715" width="95" height="58" rx="8" class="card"/>
      <text x="848" y="751" text-anchor="middle" class="box-title">FastAPI</text>

      <rect x="985" y="535" width="300" height="150" class="panel"/>
      <text x="1008" y="568" class="box-title">Batch</text>
      <rect x="1028" y="604" width="95" height="54" rx="8" class="card"/>
      <text x="1076" y="638" text-anchor="middle" class="box-small">Airflow</text>
      <rect x="1150" y="604" width="95" height="54" rx="8" class="card"/>
      <text x="1198" y="638" text-anchor="middle" class="box-small">Spark</text>

      <rect x="985" y="710" width="300" height="142" class="rag-zone"/>
      <text x="1008" y="743" class="box-title" fill="#5b21b6">Metadata RAG</text>
      <rect x="1018" y="770" width="235" height="58" rx="10" class="rag-card"/>
      <text x="1136" y="795" text-anchor="middle" class="box-small" fill="#5b21b6">Schema / Lineage / Metric</text>
      <text x="1136" y="817" text-anchor="middle" class="caption" fill="#6d28d9">chunk search + prompt context</text>

      <rect x="1340" y="535" width="300" height="150" class="panel"/>
      <text x="1363" y="568" class="box-title">Monitoring</text>
      <rect x="1384" y="604" width="95" height="54" rx="8" class="card"/>
      <text x="1432" y="638" text-anchor="middle" class="box-small">Grafana</text>
      <rect x="1512" y="604" width="95" height="54" rx="8" class="card"/>
      <text x="1560" y="638" text-anchor="middle" class="box-small">Loki</text>

      <rect x="1340" y="710" width="300" height="142" class="panel"/>
      <text x="1363" y="743" class="box-title">Metadata Store</text>
      <rect x="1378" y="776" width="105" height="54" rx="8" class="card"/>
      <text x="1431" y="810" text-anchor="middle" class="box-small">MongoDB</text>
      <rect x="1505" y="776" width="105" height="54" rx="8" class="card"/>
      <text x="1558" y="810" text-anchor="middle" class="box-small">OpenSearch</text>
    </g>
  </g>

  <g id="clean-flows">
    <line x1="152" y1="422" x2="152" y2="350" class="line"/>
    <line x1="152" y1="286" x2="152" y2="234" class="line"/>
    <path d="M232 202 H430 V263 H510" class="line"/>
    <path d="M232 318 H340 V814 H525" class="line"/>
    <path d="M270 865 H575 V838" class="line"/>

    <path d="M665 814 H800" class="line"/>
    <line x1="848" y1="715" x2="848" y2="683" class="line"/>
    <path d="M848 625 V300 H675" class="line-soft"/>
    <path d="M895 744 H985" class="rag-line"/>

    <line x1="1123" y1="631" x2="1150" y2="631" class="line"/>
    <path d="M1198 604 V360 H740 V291" class="line-soft"/>

    <path d="M1253 790 H1378" class="rag-line"/>
    <path d="M1253 817 H1505" class="rag-line"/>
    <path d="M1285 748 H1518 V220 H1560" class="rag-line"/>

    <path d="M1645 420 V500 H1490 V535" class="line-soft"/>
  </g>

  <g id="flow-labels">
    <text x="462" y="246" text-anchor="middle" class="caption">static web</text>
    <text x="356" y="800" text-anchor="middle" class="caption">API</text>
    <text x="450" y="850" text-anchor="middle" class="caption">ingest</text>
    <text x="763" y="604" text-anchor="middle" class="caption">SQL query</text>
    <text x="958" y="733" text-anchor="middle" class="caption" fill="#6d28d9">ask context</text>
    <text x="1335" y="782" text-anchor="middle" class="caption" fill="#6d28d9">metadata text</text>
    <text x="1390" y="844" text-anchor="middle" class="caption" fill="#6d28d9">vector search</text>
    <text x="1420" y="735" text-anchor="middle" class="caption" fill="#6d28d9">LLM / embedding</text>
    <text x="1010" y="354" text-anchor="middle" class="caption">batch output</text>
    <text x="1575" y="492" text-anchor="middle" class="caption">metrics/logs</text>
    <text x="1090" y="895" text-anchor="middle" class="caption">자연어 질문 → 메타데이터 검색 → LLM SQL 생성 → Trino 실행</text>
    <text x="1490" y="875" text-anchor="middle" class="caption">MongoDB: 원문 메타데이터 / OpenSearch: 벡터 인덱스</text>
    <text x="1182" y="700" text-anchor="middle" class="caption">Airflow/Spark가 메타데이터 갱신</text>
  </g>

  <g id="legend">
    <rect x="1510" y="882" width="280" height="78" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
    <text x="1530" y="910" class="caption">Legend</text>
    <line x1="1530" y1="928" x2="1590" y2="928" class="line"/>
    <text x="1605" y="933" class="caption">platform / data flow</text>
    <line x1="1530" y1="948" x2="1590" y2="948" class="rag-line"/>
    <text x="1605" y="953" class="caption">RAG / LLM flow</text>
  </g>

  <text x="1840" y="1048" text-anchor="end" class="caption">Cleaner Metadata RAG architecture SVG for Figma import</text>
</svg>
