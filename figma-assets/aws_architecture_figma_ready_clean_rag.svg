      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.6; }
      .line { fill: none; stroke: #111827; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .plain-line { fill: none; stroke: #111827; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .thin-line { fill: none; stroke: #374151; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .rag-line { fill: none; stroke: #7c3aed; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .rag-card { fill: #f8f5ff; stroke: #7c3aed; stroke-width: 2; }
      .rag-note { font-size: 13px; font-weight: 600; fill: #5b21b6; }
      .badge-text { font-size: 12px; font-weight: 800; fill: #ffffff; }
