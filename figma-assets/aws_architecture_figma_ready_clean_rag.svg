      <path d="M0,0 L10,4 L0,8 Z" fill="#111827"/>
    </marker>
    <style>
      text {
        font-family: "Noto Sans CJK KR", "Noto Sans KR", "Apple SD Gothic Neo", "Inter", Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 64px; font-weight: 800; }
      .subtitle { font-size: 18px; font-weight: 500; fill: #6b7280; }
      .section-title { font-size: 24px; font-weight: 700; }
      .box-title { font-size: 20px; font-weight: 700; }
      .box-small { font-size: 16px; font-weight: 600; }
      .note { font-size: 14px; font-weight: 500; fill: #6b7280; }
      .boundary { fill: none; stroke: #111827; stroke-width: 2.4; }
