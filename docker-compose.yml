services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: annals-board-postgres
    environment:
      POSTGRES_DB: annals_board
      POSTGRES_USER: annals
      POSTGRES_PASSWORD: annals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annals -d annals_board"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: annals-board-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://annals:annals@postgres:5432/annals_board
      ANNALS_XML_DIR: /data/xml
      ANNALS_PRIVATE_BUNDLE_ZIP: /data/annals_private_bundle.zip
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2}
      OPENAI_REALTIME_VOICE: ${OPENAI_REALTIME_VOICE:-marin}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro

  frontend:
    build:
      context: ./frontend
    container_name: annals-board-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
